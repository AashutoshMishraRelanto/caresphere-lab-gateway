services:
  - type: web
    name: caresphere-lab-gateway
    env: docker
    plan: free
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: JWT_SECRET
        sync: false
      - key: MONGO_URI
        sync: false
